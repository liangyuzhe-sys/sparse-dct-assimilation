# Training-data config: pull (bg, truth) pairs from 2021-2022 (NON-eval years)
# for CNN residual training. Mirrors data.yaml but with a training date range
# and independent output dirs, to avoid contaminating the 2023 eval data.
evaluation:
  start_date: "2021-01-04"     # 2021, year-separated from 2023 eval
  end_date:   "2022-08-29"     # stop at 2022-08 -> 2022-09..12 is buffer
  cadence:    "5D"             # every 5 days -> ~121 dates
  hour_utc:   6                # 06 UTC (same diurnal phase as eval)
aurora:
  model_class:     "AuroraPretrained"
  checkpoint_repo: "microsoft/aurora"
  checkpoint_name: "aurora-0.25-pretrained.ckpt"
  grid_shape:      [721, 1440]
  ic_offsets_h:    [-12, -6]
  pred_offset_h:   0
  pressure_levels:
    - 50
    - 100
    - 150
    - 200
    - 250
    - 300
    - 400
    - 500
    - 600
    - 700
    - 850
    - 925
    - 1000
  autocast:  true
  bf16_mode: true
  use_lora:  false
variables:
  surface:     ["2t", "10u", "10v", "msl"]
  atmospheric: ["t", "u", "v", "q", "z"]
  static:      ["lsm", "slt", "z"]
  evaluation:
    - { name: "z500", group: "atmospheric", var: "z", level: 500 }
    - { name: "z200", group: "atmospheric", var: "z", level: 200 }
    - { name: "t500", group: "atmospheric", var: "t", level: 500 }
    - { name: "t850", group: "atmospheric", var: "t", level: 850 }
    - { name: "msl",  group: "surface",     var: "msl" }
    - { name: "q700", group: "atmospheric", var: "q", level: 700 }
observations:
  fraction:    0.003
  noise_rule:  "bg_rms_fraction"
  noise_param: 0.25
  seeds:       [0, 1, 2, 3, 4]
paths:
  data_root:      "/root/autodl-fs/data/aurora_da_data"
  era5_static:    "/root/autodl-fs/data/aurora_da_data/era5/static.zarr"
  era5_ic_dir:    "/root/autodl-fs/data/aurora_da_data/train/era5/ic"
  background_dir: "/root/autodl-fs/data/aurora_da_data/train/background"
  manifest:       "/root/autodl-fs/data/aurora_da_data/train/manifest_train.json"
era5_source:
  type: "arco"
observations:
  noise_fractions: [0.005]
  n_seeds: 3
methods:
  threedvar:
    L_km: 500.0
    cutoff_factor: 4.0
